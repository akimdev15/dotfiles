unbind r
bind r source-file ~/.tmux.conf

# shifting windows to previous and next using Shift + Alt
bind -n M-H previous-window
bind -n M-L next-window

set -g prefix C-Space
set -sg escape-time 10

# act like vim
# set -g mode-keys vi
# bind-key h select-pane -L
# bind-key j select-pane -D
# bind-key k select-pane -U
# bind-key l select-pane -R

#List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Configure status line
# set -g @dracula-show-powerline true
set -g @dracula-fixed-location "New York City" 
set -g @dracula-show-fahrenheit false
set -g @dracula-plugins "weather battery"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-battery-label "Battery"
set -g @dracula-battery-colors "pink dark_gray"
set -g @dracula-show-ssh-session-port true
set -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# resize pane using mouse
set -g mouse on

# Resize panes with prefix + H/J/K/L (hold to repeat)
bind l last-window
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"


# Init TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Active pane highlight (must be after TPM to override Dracula)
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#ff79c6,bold"
set -g pane-border-lines heavy




# Terminal popup toggle
bind t display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"

# Cheatsheet popup
bind ? display-popup -E -w 85% -h 85% "navi --path $HOME/dotfiles/cheatsheets"
bind-key -n C-t if-shell "[ \"$(tmux display-message -p \"#S\")\" = \"scratch\" ]" "detach-client"
setw -g mode-keys vi
set -s set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
